[tool.poetry]
name = "xash"
version = "0.1.0"
description = "Data Science, Data Analysis, Plotting, ..."
authors = ["Medardo Antonio Rodriguez"]
license = "GPL-3.0-or-later"
repository = "https://github.com/med-merchise/xash"
keywords = ["data-science", "data-analysis"]
classifiers = [
    "Development Status :: 1 - Planning",
    "Intended Audience :: Developers",
    "Programming Language :: Python",
    "Topic :: Software Development",
    "Topic :: Data Science",
    "Topic :: Data Analysis",
]
readme = "README.rst"

[tool.poetry.dependencies]
python = "^3.10"
xit = {path = "../xit", develop = true}
pandas = "^1.4.4"
scipy = "^1.9.1"
cufflinks = { version = "^0.17.3", optional = true }
openpyxl = { version = "^3.0.10", optional = true }
seaborn = {version = "^0.12.0", optional = true}

[tool.poetry.extras]
stats = [
    "seaborn",
]
plotly = [
    "cufflinks",
]
office = [
    "openpyxl",
]
all = [
    # stats
    "seaborn",
    # plotly
    "cufflinks",
    # office
    "openpyxl",
]

[tool.poetry.group.dev.dependencies]
flake8 = "^4.0.1"
flake8-bugbear = "^22.4.25"
black = "^22.3.0"
isort = "^5.10.1"
pylint = "^2.14.5"
mypy = "^0.971"
ipdb = "^0.13.9"

[tool.poetry.group.test.dependencies]
pytest = "^7.1.2"
tox = "^3.25.0"
hypothesis = "^6.46.7"

[tool.poetry.group.docs.dependencies]
"xit.books" = {path = "../xit.books", extras = ["all"], develop = true}

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.black]
line-length = 79
target-version = ['py39', 'py310']
skip-string-normalization = true
include = '\.pyi?$'
exclude = '''
    /(
    \.eggs
  | \.git
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | _build
  | build
  | dist
  | docs
  )/
  '''

[tool.isort]
profile = "black"
line_length = 79
src_paths = ["xash", "tests"]
skip_gitignore = true

[tool.mypy]
ignore_missing_imports = true
